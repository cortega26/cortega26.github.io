name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Astro
        run: npm run build
      - name: Validate Cloudflare credentials
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi
      - name: Deploy to Cloudflare Pages
        run: |
          export CLOUDFLARE_API_TOKEN
          export CLOUDFLARE_ACCOUNT_ID
          npx wrangler@4 pages deploy dist --project-name=tooltician --branch=master
